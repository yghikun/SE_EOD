name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Cache sparse Linux sources
        uses: actions/cache@v4
        with:
          path: linux-sources
          key: linux-fs-v6.8-v6.14-v7.1-${{ runner.os }}-v1

      - name: Prepare pinned Linux sources
        shell: bash
        run: |
          set -euo pipefail
          for version in 6.8 6.14 7.1; do
            python scripts/download_linux_fs.py \
              --ref "v${version}" \
              --target "linux-sources/linux-v${version}-fs" \
              --sparse-path fs/ext4 \
              --sparse-path fs/xfs \
              --sparse-path fs/btrfs
          done

      - name: Compile
        run: python -m compileall -q src tests scripts

      - name: Test
        run: python -m pytest -q
